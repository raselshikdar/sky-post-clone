name: Build Android TWA

on:
  workflow_dispatch:
  push:
    paths:
      - 'android-twa/**'
      - '.github/workflows/build-twa.yml'

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: android-twa

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Generate temporary keystore
        run: |
          keytool -genkeypair \
            -alias awaj \
            -keypass android \
            -keystore android.keystore \
            -storepass android \
            -dname "CN=Awaj,O=Awaj,L=Dhaka,C=BD" \
            -validity 10000 \
            -keyalg RSA \
            -keysize 2048

      - name: Build TWA (APK + AAB)
        run: |
          bubblewrap build \
            --skipPwaValidation \
            --signingKeyPath=android.keystore \
            --signingKeyAlias=awaj \
            --signingKeyPassword=android \
            --signingKeyStorePassword=android

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: twa-apk
          path: "**/*.apk"
          if-no-files-found: error

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: twa-aab
          path: "**/*.aab"
          if-no-files-found: error
