name: Build Android TWA

on:
  workflow_dispatch:
  push:
    paths:
      - 'android-twa/**'
      - '.github/workflows/android-build.yml'

env:
  MANIFEST_URL: "https://sky-post-clone.lovable.app/manifest.json"
  TWA_DIR: "android-twa"

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ env.TWA_DIR }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      # ---------- SIGNING KEY ----------
      - name: Decode keystore from secret (if available)
        id: keystore
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android.keystore
            echo "keystore_available=true" >> $GITHUB_OUTPUT
          else
            echo "keystore_available=false" >> $GITHUB_OUTPUT
            echo "⚠️ No keystore secret found. A temporary keystore will be generated."
          fi

      - name: Generate temporary keystore (only if secret missing)
        if: steps.keystore.outputs.keystore_available == 'false'
        run: |
          keytool -genkeypair \
            -alias awaj \
            -keypass android \
            -keystore android.keystore \
            -storepass android \
            -dname "CN=Awaj,O=Awaj,L=Dhaka,C=BD" \
            -validity 10000 \
            -keyalg RSA \
            -keysize 2048
          echo "✅ Temporary keystore created (for testing only)."

      # ---------- CLEAN OLD BUILD FILES ----------
      - name: Clean previous build files
        run: |
          rm -rf ./app ./gradle ./build ./gradlew ./settings.gradle ./build.gradle ./local.properties 2>/dev/null || true
          echo "🧹 Old build files removed."

      # ---------- INSTALL EXPECT (FOR INTERACTIVE PROMPTS) ----------
      - name: Install expect
        run: sudo apt-get update && sudo apt-get install -y expect

      # ---------- INITIALIZE TWA PROJECT USING EXPECT ----------
      - name: Initialize TWA project from manifest
        run: |
          expect << EOF
          set timeout 30
          spawn bubblewrap init --manifest="${{ env.MANIFEST_URL }}" --skipPwaValidation --directory=.
          expect {
            "*install the JDK*" { send "n\r"; exp_continue }
            "*Path to your existing JDK*" { send "$JAVA_HOME\r"; exp_continue }
            eof
          }
          EOF
          echo "✅ TWA project initialized."

      # ---------- BUILD (NON-INTERACTIVE) ----------
      - name: Build TWA (APK + AAB)
        run: |
          printf "n\n" | bubblewrap build \
            --skipPwaValidation \
            --signingKeyPath=android.keystore \
            --signingKeyAlias=awaj \
            --signingKeyPassword=android \
            --signingKeyStorePassword=android

      # ---------- LOCATE AND UPLOAD ARTIFACTS ----------
      - name: Locate APK and AAB
        id: locate
        run: |
          apk_path=$(find . -name "*release*.apk" | head -1)
          aab_path=$(find . -name "*.aab" | head -1)
          echo "apk_path=$apk_path" >> $GITHUB_OUTPUT
          echo "aab_path=$aab_path" >> $GITHUB_OUTPUT

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: awaj-twa-apk
          path: ${{ steps.locate.outputs.apk_path }}
          if-no-files-found: error

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: awaj-twa-aab
          path: ${{ steps.locate.outputs.aab_path }}
          if-no-files-found: error
