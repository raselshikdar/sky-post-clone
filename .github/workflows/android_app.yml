name: Build Android APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          
      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          
      - name: Install dependencies
        run: |
          npm install
          npm install @capacitor/cli @capacitor/core @capacitor/android
          
      - name: Build Web App
        run: npm run build
        
      - name: Create and Sync Android Platform
        run: |
          # যদি আগে থেকে অ্যান্ড্রয়েড ফোল্ডার থাকে তবে তা মুছে ফেলা (যাতে কোনো পুরনো এরর না থাকে)
          rm -rf android
          # একদম নতুন করে অ্যান্ড্রয়েড প্ল্যাটফর্ম যোগ করা
          npx cap add android
          # কোড সিঙ্ক করা
          npx cap sync android
        
      - name: Build APK with Gradle
        run: |
          cd android
          # gradlew ফাইলকে এক্সিকিউটেবল পারমিশন দেওয়া
          chmod +x gradlew
          # বিল্ড শুরু করা
          ./gradlew assembleDebug
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Awaj-App-Debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
